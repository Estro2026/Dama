name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - "claude/**"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: landing/package-lock.json

      - name: Sync assets from root to public
        run: |
          cp -r Loghi/. landing/public/loghi/
          cp -r immagini/. landing/public/immagini/

      - name: Install dependencies
        working-directory: landing
        run: npm ci

      - name: Build
        working-directory: landing
        run: npm run build

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: landing/out

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  report-build-status:
    if: github.ref != 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Build OK
        run: echo "Build passed on ${{ github.ref_name }}"
